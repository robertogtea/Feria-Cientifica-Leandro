<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI TRIVIA - Matemática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Pantalla de inicio -->
        <div id="start-screen">
            <h1>MI TRIVIA</h1>
            <p class="subtitle">¡Pon a prueba tus conocimientos de matemática!</p>
            <button class="btn" onclick="startGame()">¡Jugar!</button>
        </div>

        <!-- Pantalla de preguntas -->
        <div id="question-screen" class="question-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="timer" id="timer">15</div>
            <div class="question" id="question"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- Pantalla final -->
        <div id="final-screen" class="final-container">
            <h1>¡Juego Terminado!</h1>
            <div class="score" id="final-score">0/10</div>
            <div class="message" id="final-message"></div>
            <button class="btn" onclick="restartGame()">Jugar de nuevo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
